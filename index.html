<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sarina Dashboard Pro</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="header">
        <div class="logo-area">
            <img src="logo.png" alt="Sarina" class="logo-bulat">
            <h1>Sarina Dashboard</h1>
        </div>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Cari data..." onkeyup="filterTabel()">
        </div>
    </div>
    
    <div class="menu-nav">
        <button class="btn-menu" onclick="pindahMenu('stok')">📦 Stok</button>
        <button class="btn-menu" onclick="pindahMenu('kas')">💰 Kas</button>
        <button class="btn-menu" onclick="pindahMenu('pengiriman')">🚚 Pengiriman</button>
    </div>

    <div class="card">
        <h2 id="judul-halaman">Stok Barang</h2>
        <table>
            <thead id="tabel-head"></thead>
            <tbody id="tabel-body">
                <tr><td colspan="4">Memuat data...</td></tr>
            </tbody>
        </table>
    </div>

    <script src="script.js"></script>
</body>
</html>
